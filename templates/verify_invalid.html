<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Not Found</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
    .verify-card { max-width: 480px; width: 100%; background: var(--white); border-radius: var(--radius); padding: 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .icon-invalid { width: 72px; height: 72px; border-radius: 50%; background: #fef2f2; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; color: #dc2626; }
    h1 { color: #dc2626; font-size: 1.5rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="verify-card">
    <div class="icon-invalid"><i class="fas fa-times-circle"></i></div>
    <h1>Certificate Not Found</h1>
    <p style="color:var(--text-muted);">This certificate could not be verified. The verification code may be invalid or the certificate has been revoked.</p>
    <p style="font-size:0.82rem;color:var(--text-muted);margin-top:16px;">If you believe this is an error, please contact Sathyabama Institute of Science and Technology.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</body>
</html>
