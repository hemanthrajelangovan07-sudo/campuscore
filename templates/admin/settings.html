{% extends "base.html" %}
{% block title %}System Settings{% endblock %}
{% block page_title %}<i class="fas fa-cog"></i> System Settings{% endblock %}

{% block content %}
<div class="page-header"><div><h1 class="page-heading">System Settings</h1><p class="page-sub">Platform-wide configuration</p></div></div>
<div class="card form-card" style="max-width:560px;">
  <form method="POST">
    <div class="form-section"><h4 class="form-section-title"><i class="fas fa-palette"></i> Default Appearance</h4>
      <div class="form-row">
        <div class="form-group"><label>Default Theme</label><select name="default_theme"><option value="light" {% if settings.get('default_theme') == 'light' %}selected{% endif %}>Light</option><option value="dark" {% if settings.get('default_theme') == 'dark' %}selected{% endif %}>Dark</option></select></div>
        <div class="form-group"><label>Default Language</label><select name="default_language"><option value="english" {% if settings.get('default_language') == 'english' %}selected{% endif %}>English</option></select></div>
      </div>
    </div>
    <div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Settings</button></div>
  </form>
</div>
{% endblock %}
